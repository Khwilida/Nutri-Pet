<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutri Pet 🐾</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Poppins, sans-serif;
  background:#f9fdfb;
}

/* HEADER */
header {
  text-align:center;
  padding:120px 20px;
  background:linear-gradient(135deg,#56ab2f,#2d6a4f);
  color:white;
}

header h1 {
  font-family:'Luckiest Guy', cursive;
  font-size:3em;
  margin:0;
}

.btn {
  display:inline-block;
  margin-top:15px;
  padding:12px 25px;
  background:#ffd700;
  color:#2d6a4f;
  border-radius:25px;
  text-decoration:none;
  font-weight:bold;
}

/* ANIMAUX */
.animals {
  margin-top:20px;
  font-size:2em;
}

/* SECTIONS */
section {
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

h2 {
  text-align:center;
  color:#2d6a4f;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card img {
  width:100%;
  border-radius:15px;
}

/* ABOUT */
.about {
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  align-items:center;
}

.about img {
  width:100%;
  max-width:450px;
  border-radius:15px;
}

/* MAP */
iframe {
  width:100%;
  height:300px;
  border:none;
  border-radius:15px;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  background:#2d6a4f;
  color:white;
}
</style>
</head>

<body>

<header>
  <h1>🐾 Nutri Pet</h1>
  <p>Bien-être de vos animaux 🐶🐱</p>

  <a href="#contact" class="btn">📩 Nous contacter</a>

  <div class="animals">
    🐶 🐱 🐰 🦆 🦜 🐹 🕊️
  </div>
</header>

<section id="about">
  <h2>À propos</h2>

  <div class="about">
    <img src="https://raw.githubusercontent.com/Khwilida/Nutri-Pet/main/images/banner.jpg">

    <p>🏪 Animalerie à Meknès spécialisée dans les animaux.</p>
  </div>
</section>

<section>
  <h2>📸 Galerie</h2>

  <div class="grid">
    <img src="https://raw.githubusercontent.com/Khwilida/Nutri-Pet/main/images/banner.jpg">
    <img src="https://raw.githubusercontent.com/Khwilida/Nutri-Pet/main/images/banner.jpg">
    <img src="https://raw.githubusercontent.com/Khwilida/Nutri-Pet/main/images/banner.jpg">
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>

  <p>📍 Meknès - Sidi Bouzekri</p>

  <iframe src="https://www.google.com/maps?q=Sidi%20Bouzekri%20Meknès&output=embed"></iframe>
</section>

<footer>
  © 2025 Nutri Pet 🐾
</footer>

</body>
</html>
